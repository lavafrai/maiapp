name: Build and Push Server3 Image

on:
  push:
    branches: [ "master" ]
    paths:
      - 'server3/**'
      - 'Dockerfile.server3'
      - '.github/workflows/build-server3.yml'
  workflow_dispatch:

jobs:
  build_server3_image:
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Server3 Image
        run: |
          docker build -f Dockerfile.server3 . --tag ghcr.io/${{ github.repository }}/maiserver3:latest
          docker push ghcr.io/${{ github.repository }}/maiserver3:latest
