name: Build KMP iOS Sideload IPA (maiapp)

on:
  push:
    branches: [ "master" ]
    paths:
      - '.github/workflows/build-ios.yml'
      - '.github/actions/common-build-setup/**'
      - 'iosApp/**'
      - 'composeApp/**'
      - 'models/**'
      - 'shared/**'
      - 'network/**'
      - 'gradle/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      SCHEME_NAME: iosApp
      PROJECT_PATH: iosApp/iosApp.xcodeproj
      DERIVED_DATA_PATH: build-ios-sideload
      OUTPUT_DIR_IOS: iosApp/actions
      PRODUCT_NAME: maiapp
      IPA_NAME: maiapp-sideload.ipa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup common build environment
        uses: ./.github/actions/common-build-setup
        with:
          java-version: '17'
          secrets-properties: ${{ secrets.SECRETS_PROPERTIES }}

      - name: Build iPhoneOS app without Apple signing
        run: |
          rm -rf "${DERIVED_DATA_PATH}"
          rm -rf "${OUTPUT_DIR_IOS}"
          mkdir -p "${OUTPUT_DIR_IOS}"

          xcodebuild clean build \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME_NAME}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Pack app as sideload IPA
        run: |
          APP_PATH="$(find "${DERIVED_DATA_PATH}/Build/Products/Release-iphoneos" -maxdepth 1 -type d -name "*.app" | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app found in ${DERIVED_DATA_PATH}/Build/Products/Release-iphoneos"
            find "${DERIVED_DATA_PATH}/Build/Products" -maxdepth 5 -type d -name "*.app" || true
            exit 1
          fi

          echo "Using app: $APP_PATH"

          rm -rf "${OUTPUT_DIR_IOS}/Payload"
          mkdir -p "${OUTPUT_DIR_IOS}/Payload"

          cp -R "$APP_PATH" "${OUTPUT_DIR_IOS}/Payload/"

          APP_BUNDLE="$(find "${OUTPUT_DIR_IOS}/Payload" -maxdepth 1 -type d -name "*.app" | head -n 1)"

          # Optional structural ad-hoc signature.
          # AltStore/Sideloadly will re-sign the app with the user's Apple ID anyway.
          codesign --force --deep --sign - "$APP_BUNDLE" || true

          cd "${OUTPUT_DIR_IOS}"
          zip -qry "${IPA_NAME}" Payload

      - name: Validate IPA structure
        run: |
          IPA_PATH="${OUTPUT_DIR_IOS}/${IPA_NAME}"

          echo "IPA: $IPA_PATH"
          test -f "$IPA_PATH"

          rm -rf ipa-check
          mkdir ipa-check
          unzip -q "$IPA_PATH" -d ipa-check

          APP_BUNDLE="$(find ipa-check/Payload -maxdepth 1 -type d -name "*.app" | head -n 1)"

          if [ -z "$APP_BUNDLE" ]; then
            echo "Invalid IPA: Payload/*.app not found"
            exit 1
          fi

          echo "App bundle: $APP_BUNDLE"

          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_BUNDLE/Info.plist")
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_BUNDLE/Info.plist")
          MIN_IOS=$(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "$APP_BUNDLE/Info.plist")

          echo "Executable: $EXECUTABLE"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Minimum iOS: $MIN_IOS"

          test -f "$APP_BUNDLE/$EXECUTABLE"

          file "$APP_BUNDLE/$EXECUTABLE"

          if ! file "$APP_BUNDLE/$EXECUTABLE" | grep -q "arm64"; then
            echo "Invalid binary: expected arm64 iPhoneOS binary"
            exit 1
          fi

          if /usr/libexec/PlistBuddy -c 'Print :CFBundleSupportedPlatforms:0' "$APP_BUNDLE/Info.plist" | grep -q "iPhoneOS"; then
            echo "Platform OK: iPhoneOS"
          else
            echo "Invalid platform: expected iPhoneOS"
            exit 1
          fi

      - name: Upload sideload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-sideload-artifact
          path: ${{ env.OUTPUT_DIR_IOS }}/${{ env.IPA_NAME }}
          retention-days: 7