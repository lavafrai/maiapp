# preserve original client scheme if provided by upstream (e.g., Cloudflare/Caddy)
map $http_x_forwarded_proto $client_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    listen [::]:80;

    location / {
        proxy_pass http://landing:80/;
    }

    location ^~ /admin {
        proxy_pass http://server3:80/admin;
    }

    location ^~ /api/v1 {
        proxy_pass http://server3:80/;
        proxy_pass_header Cache-Control;
        proxy_pass_header Expires;
        proxy_pass_header ETag;
        proxy_cache off;
    }

    location = /donate {
        return 301 https://lavafrai.ru/donations;
    }

    location = /thanks {
        proxy_pass http://server3:80/assets/thanks.txt;
    }

    location = /download/ios {
        return 301 https://apps.apple.com/us/app/%D1%80%D0%B0%D1%81%D0%BF%D0%B8%D1%81%D0%B0%D0%BD%D0%B8%D0%B5-%D0%BC%D0%B0%D0%B8/id6739470086;
    }

    location /privacy_policy {
        proxy_pass http://server3:80/assets/privacy_policy.txt;
    }

    location /support {
        return 301 https://t.me/maiapp3;
    }

    # Redirect bare path to trailing slash for Grafana
    location = /grafana {
        return 301 /grafana/;
    }

    # Expose Grafana under subpath with WebSocket support
    location ^~ /grafana/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix "";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_redirect off;
        proxy_pass http://grafana:3000/;
    }
}
